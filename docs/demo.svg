<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 248" width="760" font-family="'SF Mono','DejaVu Sans Mono',Menlo,Consolas,monospace">
  <defs>
    <style><![CDATA[
      .bg     { fill: #0d1117; }
      .bar    { fill: #161b22; }
      .edge   { stroke: #30363d; stroke-width: 1; }
      text    { font-size: 15px; dominant-baseline: middle; }
      .title  { fill: #7d8590; font-size: 13px; }
      .prompt { fill: #3fb950; }
      .user   { fill: #e6edf3; }
      .dim    { fill: #7d8590; }
      .ok     { fill: #3fb950; }
      .hi     { fill: #aff5b4; }
      .phone  { fill: #58a6ff; }

      .scene  { animation: 24s linear infinite both; }
      .scA { animation-name: scA; } .scB { animation-name: scB; } .scC { animation-name: scC; }
      @keyframes scA { 0%{opacity:1} 30%{opacity:1} 32%{opacity:0} 100%{opacity:0} }
      @keyframes scB { 0%,32%{opacity:0} 34%{opacity:1} 63%{opacity:1} 65%{opacity:0} 100%{opacity:0} }
      @keyframes scC { 0%,65%{opacity:0} 67%{opacity:1} 98%{opacity:1} 100%{opacity:0} }

      .ln { animation: 24s linear infinite both; }
      .r2{animation-name:r2}.r8{animation-name:r8}.r14{animation-name:r14}.r20{animation-name:r20}.r26{animation-name:r26}
      .r35{animation-name:r35}.r41{animation-name:r41}.r47{animation-name:r47}.r53{animation-name:r53}.r59{animation-name:r59}
      .r68{animation-name:r68}.r74{animation-name:r74}.r80{animation-name:r80}.r86{animation-name:r86}
      @keyframes r2 {0%,1%{opacity:0}3%,100%{opacity:1}}
      @keyframes r8 {0%,7%{opacity:0}9%,100%{opacity:1}}
      @keyframes r14{0%,13%{opacity:0}15%,100%{opacity:1}}
      @keyframes r20{0%,19%{opacity:0}21%,100%{opacity:1}}
      @keyframes r26{0%,25%{opacity:0}27%,100%{opacity:1}}
      @keyframes r35{0%,34%{opacity:0}36%,100%{opacity:1}}
      @keyframes r41{0%,40%{opacity:0}42%,100%{opacity:1}}
      @keyframes r47{0%,46%{opacity:0}48%,100%{opacity:1}}
      @keyframes r53{0%,52%{opacity:0}54%,100%{opacity:1}}
      @keyframes r59{0%,58%{opacity:0}60%,100%{opacity:1}}
      @keyframes r68{0%,67%{opacity:0}69%,100%{opacity:1}}
      @keyframes r74{0%,73%{opacity:0}75%,100%{opacity:1}}
      @keyframes r80{0%,79%{opacity:0}81%,100%{opacity:1}}
      @keyframes r86{0%,85%{opacity:0}87%,100%{opacity:1}}

      .cur { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
    ]]></style>
  </defs>

  <rect class="bg" x="0" y="0" width="760" height="248" rx="9"/>
  <path class="bar" d="M0 9 a9 9 0 0 1 9 -9 H751 a9 9 0 0 1 9 9 V44 H0 Z"/>
  <line class="edge" x1="0" y1="44" x2="760" y2="44"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="22" r="6" fill="#27c93f"/>
  <text class="title" x="94" y="23">agentspace — an agent OS that writes its own tools</text>

  <!-- Scene A: self-writing tool + watch -->
  <g class="scene scA">
    <text x="24" y="78"  class="ln r2"><tspan class="prompt">agentspace&gt;</tspan> <tspan class="user">track BTC, ping my phone if it cracks $70k</tspan></text>
    <text x="44" y="110" class="ln r8"  ><tspan class="dim">↳ conductor → watchdog</tspan></text>
    <text x="44" y="142" class="ln r14" ><tspan class="hi">✎ pi · writing track_btc.py …</tspan></text>
    <text x="44" y="174" class="ln r20" ><tspan class="hi">▸ track_btc → $67,412</tspan></text>
    <text x="44" y="206" class="ln r26" ><tspan class="ok">✓ watching every 30m · phone alert armed</tspan></text>
  </g>

  <!-- Scene B: two-way Telegram -->
  <g class="scene scB">
    <text x="24" y="78"  class="ln r35"><tspan class="phone">tg ›</tspan> <tspan class="user">what are france's world cup odds?</tspan></text>
    <text x="44" y="110" class="ln r41"><tspan class="dim">↳ conductor → researcher</tspan></text>
    <text x="44" y="142" class="ln r47"><tspan class="dim">▸ web_search …</tspan></text>
    <text x="44" y="174" class="ln r53"><tspan class="hi">✓ ~18% — 2nd favourite behind Spain  [bbc]</tspan></text>
    <text x="44" y="206" class="ln r59"><tspan class="phone">→ texted the answer back to your phone</tspan></text>
  </g>

  <!-- Scene C: self-writing agent -->
  <g class="scene scC">
    <text x="24" y="78"  class="ln r68"><tspan class="prompt">agentspace&gt;</tspan> <tspan class="user">/create-agent a stock portfolio tracker</tspan></text>
    <text x="44" y="110" class="ln r74"><tspan class="hi">✎ pi · building agents/portfolio-tracker …</tspan></text>
    <text x="44" y="142" class="ln r80"><tspan class="ok">✓ live — no restart, no framework</tspan></text>
    <text x="24" y="174" class="ln r86"><tspan class="prompt">agentspace&gt;</tspan> <tspan class="user cur">▍</tspan></text>
  </g>
</svg>
